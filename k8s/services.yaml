apiVersion: v1
kind: Service
metadata:
  name: bank-app-service
spec:
  type: NodePort
  selector:
    app: my-app
  ports:
    - name: frontend
      port: 80
      targetPort: 3000
      nodePort: 30017

    - name: backend
      port: 81
      targetPort: 3001
      nodePort: 30018
---
apiVersion: v1
kind: Service
metadata:
  name: db
spec:
  selector:
    app: db
  ports:
    - port: 5432
      targetPort: 5432

      

